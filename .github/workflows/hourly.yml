name: Hourly Report

on:
  schedule:
    - cron: '0 * * * *'  # Chạy vào phút thứ 0 của mỗi giờ
  workflow_dispatch:      # Nút bấm chạy thủ công

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4
      
      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Cài đặt thư viện
        run: npm ci || npm install
        
      - name: Chạy Bot Báo Cáo
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_AD_ACCOUNT_ID: ${{ secrets.FB_AD_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node index.js --run-once
